#Every time you push code to GitHub, this file automatically runs your tests on GitHub's servers. If tests pass you get a green checkmark. If they fail you get a red cross and an email.  proof to every interviewer that your code actually works.
name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run tests
        env:
          GROQ_API_KEY: "test_key_ci"
        run: pytest tests/ -v --tb=short
